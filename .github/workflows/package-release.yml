name: Package release zip

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ghidra_version:
        description: 'Ghidra release to compile against (e.g. 12.0.4)'
        required: false
        default: '12.0.4'

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    env:
      GHIDRA_VERSION: ${{ github.event.inputs.ghidra_version || '12.0.4' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Resolve Ghidra release URL
        id: resolve
        run: |
          set -euo pipefail
          RELEASE_JSON="$(curl -fsSL https://api.github.com/repos/NationalSecurityAgency/ghidra/releases)"
          URL="$(printf '%s' "$RELEASE_JSON" \
            | jq -r --arg v "$GHIDRA_VERSION" \
                '[.[] | .assets[] | select(.name | test("ghidra_" + $v + "_PUBLIC_[0-9]+\\.zip$"))][0].browser_download_url')"
          if [ -z "$URL" ] || [ "$URL" = "null" ]; then
            echo "Could not resolve Ghidra release ${GHIDRA_VERSION}" >&2
            exit 1
          fi
          echo "ghidra_url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Download and unpack Ghidra
        run: |
          set -euo pipefail
          mkdir -p ghidra
          curl -fL --retry 3 -o ghidra.zip "${{ steps.resolve.outputs.ghidra_url }}"
          unzip -q ghidra.zip -d ghidra
          rm ghidra.zip
          inner="$(find ghidra -maxdepth 1 -mindepth 1 -type d -name 'ghidra_*' | head -n1)"
          shopt -s dotglob
          mv "$inner"/* ghidra/
          rmdir "$inner"

      - name: Stage and compile processor
        run: |
          set -euo pipefail
          dest="package/Ghidra/Processors/SPC700"
          mkdir -p "$dest"
          cp Module.manifest "$dest/"
          cp -r data "$dest/"
          chmod +x ghidra/support/sleigh
          ghidra/support/sleigh -a "$dest"
          test -f "$dest/data/languages/spc700.sla"

      - name: Create installable zip
        id: zip
        run: |
          set -euo pipefail
          ref="${GITHUB_REF_NAME:-manual}"
          name="ghidra-spc700-${ref}.zip"
          (cd package && zip -qr "../$name" Ghidra)
          sha256sum "$name" | tee "$name.sha256"
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.zip.outputs.name }}
          path: |
            ${{ steps.zip.outputs.name }}
            ${{ steps.zip.outputs.name }}.sha256

      - name: Attach zip to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes "SPC700 processor module release."
          gh release upload "$GITHUB_REF_NAME" "${{ steps.zip.outputs.name }}" "${{ steps.zip.outputs.name }}.sha256" --clobber
