name: Compile SLEIGH spec

on:
  push:
    branches: [master, main]
    paths:
      - 'data/languages/**'
      - 'Module.manifest'
      - '.github/workflows/sleigh-compile.yml'
      - 'tests/**'
  pull_request:
    paths:
      - 'data/languages/**'
      - 'Module.manifest'
      - '.github/workflows/sleigh-compile.yml'
      - 'tests/**'
  workflow_dispatch:
    inputs:
      ghidra_version:
        description: 'Ghidra release to compile against (e.g. 12.0.4)'
        required: false
        default: '12.0.4'

jobs:
  compile:
    runs-on: ubuntu-latest
    env:
      GHIDRA_VERSION: ${{ github.event.inputs.ghidra_version || '12.0.4' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Resolve Ghidra release URL
        id: resolve
        run: |
          set -euo pipefail
          RELEASE_JSON="$(curl -fsSL https://api.github.com/repos/NationalSecurityAgency/ghidra/releases)"
          URL="$(printf '%s' "$RELEASE_JSON" \
            | jq -r --arg v "$GHIDRA_VERSION" \
                '[.[] | .assets[] | select(.name | test("ghidra_" + $v + "_PUBLIC_[0-9]+\\.zip$"))][0].browser_download_url')"
          if [ -z "$URL" ] || [ "$URL" = "null" ]; then
            echo "Could not resolve Ghidra release ${GHIDRA_VERSION}" >&2
            exit 1
          fi
          echo "ghidra_url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Cache Ghidra distribution
        id: cache-ghidra
        uses: actions/cache@v4
        with:
          path: ghidra
          key: ghidra-${{ env.GHIDRA_VERSION }}

      - name: Download and unpack Ghidra
        if: steps.cache-ghidra.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p ghidra
          curl -fL --retry 3 -o ghidra.zip "${{ steps.resolve.outputs.ghidra_url }}"
          unzip -q ghidra.zip -d ghidra
          rm ghidra.zip
          inner="$(find ghidra -maxdepth 1 -mindepth 1 -type d -name 'ghidra_*' | head -n1)"
          shopt -s dotglob
          mv "$inner"/* ghidra/
          rmdir "$inner"

      - name: Stage processor module under Ghidra/Processors/SPC700
        run: |
          set -euo pipefail
          dest="ghidra/Ghidra/Processors/SPC700"
          mkdir -p "$dest"
          cp Module.manifest "$dest/"
          cp -r data "$dest/"

      - name: Compile SLEIGH spec
        shell: bash {0}
        run: |
          set -uo pipefail
          chmod +x ghidra/support/sleigh
          ghidra/support/sleigh -a ghidra/Ghidra/Processors/SPC700 > sleigh.log 2>&1
          rc=$?
          echo "sleigh exit code: $rc"
          cat sleigh.log
          if grep -E '^(ERROR|FATAL)' sleigh.log >/dev/null; then
            echo "SLEIGH compile reported errors" >&2
            exit 1
          fi
          test -f ghidra/Ghidra/Processors/SPC700/data/languages/spc700.sla

      - name: Run processor smoke test
        run: |
          set -euo pipefail
          mkdir -p smoke scripts
          cp tests/ProcessorSmoke.java scripts/
          cp tests/InstructionTextSmoke.java scripts/
          cp tests/SemanticSmoke.java scripts/
          printf '\xE8\x12\xCD\x02\x8D\x03\x88\x01\x86\x84\x10\x94\x11\x85\x00\x20\x95\x02\x20\x96\x04\x20\x87\x12\x97\x13\xA8\x01\xA6\xA4\x10\xB4\x11\xA5\x00\x20\xB5\x02\x20\xB6\x04\x20\xA7\x12\xB7\x13\x28\x0F\x26\x24\x10\x34\x11\x25\x00\x20\x35\x02\x20\x36\x04\x20\x27\x12\x37\x13\x48\xF0\x46\x44\x10\x54\x11\x45\x00\x20\x55\x02\x20\x56\x04\x20\x47\x12\x57\x13\x08\x01\x06\x04\x10\x14\x11\x05\x00\x20\x15\x02\x20\x16\x04\x20\x07\x12\x17\x13\x68\x01\x66\x64\x10\x74\x11\x65\x00\x20\x75\x02\x20\x76\x04\x20\x67\x12\x77\x13\x99\x89\x10\x11\x98\x01\x11\xB9\xA9\x10\x11\xB8\x01\x11\x39\x29\x10\x11\x38\x01\x11\x59\x49\x10\x11\x58\x01\x11\x19\x09\x10\x11\x18\x01\x11\x79\x69\x10\x11\x78\x01\x11\x3D\x2F\x01\x00' > smoke/spc700.bin
          expected=(MOV MOV MOV ADC ADC ADC ADC ADC ADC ADC ADC ADC SBC SBC SBC SBC SBC SBC SBC SBC SBC AND AND AND AND AND AND AND AND AND EOR EOR EOR EOR EOR EOR EOR EOR EOR OR OR OR OR OR OR OR OR OR CMP CMP CMP CMP CMP CMP CMP CMP CMP ADC ADC ADC SBC SBC SBC AND AND AND EOR EOR EOR OR OR OR CMP CMP CMP INC BRA NOP)
          ghidra/support/analyzeHeadless "$PWD" smoke-proj \
            -import smoke/spc700.bin \
            -processor SPC700:LE:16:default \
            -cspec default \
            -loader BinaryLoader \
            -loader-baseAddr 0x0000 \
            -scriptPath scripts \
            -postScript ProcessorSmoke.java SPC700:LE:16:default "${expected[@]}" \
            -deleteProject

          printf '\xE8\x12\xCD\x02\x8D\x03\xE6\xBF\xE4\x10\xF4\x11\xE5\x00\x20\xF5\x02\x20\xF6\x04\x20\xE7\x12\xF7\x13\xF8\x10\xF9\x11\xE9\x00\x20\xEB\x10\xFB\x11\xEC\x00\x20\xC6\xAF\xC4\x10\xD4\x11\xC5\x00\x20\xD5\x02\x20\xD6\x04\x20\xC7\x12\xD7\x13\xD8\x10\xD9\x11\xC9\x00\x20\xCB\x10\xDB\x11\xCC\x00\x20\xFA\x10\x11\x8F\x01\x11\x00' > smoke/mov.bin
          mov_expected=()
          for _ in $(seq 1 35); do mov_expected+=(MOV); done
          mov_expected+=(NOP)
          ghidra/support/analyzeHeadless "$PWD" smoke-mov-proj \
            -import smoke/mov.bin \
            -processor SPC700:LE:16:default \
            -cspec default \
            -loader BinaryLoader \
            -loader-baseAddr 0x0000 \
            -scriptPath scripts \
            -postScript ProcessorSmoke.java SPC700:LE:16:default "${mov_expected[@]}" \
            -deleteProject

          printf '\x1C\x0B\x10\x1B\x11\x0C\x00\x20\x5C\x4B\x10\x5B\x11\x4C\x00\x20\x3C\x2B\x10\x3B\x11\x2C\x00\x20\x7C\x6B\x10\x7B\x11\x6C\x00\x20\xAB\x10\xBB\x11\xAC\x00\x20\x8B\x10\x9B\x11\x8C\x00\x20\xC8\x01\x3E\x10\x1E\x00\x20\xAD\x01\x7E\x10\x5E\x00\x20\x7A\x10\x9A\x10\x5A\x10\x00' > smoke/arith.bin
          arith_expected=(ASL ASL ASL ASL LSR LSR LSR LSR ROL ROL ROL ROL ROR ROR ROR ROR INC INC INC DEC DEC DEC CMP CMP CMP CMP CMP CMP ADDW SUBW CMPW NOP)
          ghidra/support/analyzeHeadless "$PWD" smoke-arith-proj \
            -import smoke/arith.bin \
            -processor SPC700:LE:16:default \
            -cspec default \
            -loader BinaryLoader \
            -loader-baseAddr 0x0000 \
            -scriptPath scripts \
            -postScript ProcessorSmoke.java SPC700:LE:16:default "${arith_expected[@]}" \
            -deleteProject

          printf '\x02\x10\x12\x10\x22\x11\x32\x11\x42\x12\x52\x12\x62\x13\x72\x13\x82\x14\x92\x14\xA2\x15\xB2\x15\xC2\x16\xD2\x16\xE2\x17\xF2\x17\x03\x20\x01\x13\x20\x01\x23\x21\x01\x33\x21\x01\x43\x22\x01\x53\x22\x01\x63\x23\x01\x73\x23\x01\x83\x24\x01\x93\x24\x01\xA3\x25\x01\xB3\x25\x01\xC3\x26\x01\xD3\x26\x01\xE3\x27\x01\xF3\x27\x01\x2E\x30\x01\xDE\x31\x01\x6E\x32\x01\xFE\x01\x00' > smoke/bitbranch.bin
          bitbranch_expected=(SET1 CLR1 SET1 CLR1 SET1 CLR1 SET1 CLR1 SET1 CLR1 SET1 CLR1 SET1 CLR1 SET1 CLR1 BBS BBC BBS BBC BBS BBC BBS BBC BBS BBC BBS BBC BBS BBC BBS BBC CBNE CBNE DBNZ DBNZ NOP)
          ghidra/support/analyzeHeadless "$PWD" smoke-bitbranch-proj \
            -import smoke/bitbranch.bin \
            -processor SPC700:LE:16:default \
            -cspec default \
            -loader BinaryLoader \
            -loader-baseAddr 0x0000 \
            -scriptPath scripts \
            -postScript ProcessorSmoke.java SPC700:LE:16:default "${bitbranch_expected[@]}" \
            -deleteProject

          printf '\x01\x11\x21\x31\x41\x51\x61\x71\x81\x91\xA1\xB1\xC1\xD1\xE1\xF1\x0A\x00\x20\x0E\x00\x20\x1A\x10\x1F\x00\x20\x2A\x00\x20\x3A\x10\x4A\x00\x20\x4E\x00\x20\x4F\x80\x6A\x00\x20\x7F\x8A\x00\x20\x9E\x9F\xAA\x00\x20\xBA\x10\xBE\xCA\x00\x20\xCF\xDA\x10\xDF\xEA\x00\x20\xED\xEF\xFF' > smoke/remaining.bin
          remaining_expected=(TCALL TCALL TCALL TCALL TCALL TCALL TCALL TCALL TCALL TCALL TCALL TCALL TCALL TCALL TCALL TCALL OR1 TSET1 DECW JMP OR1 INCW AND1 TCLR1 PCALL AND1 RETI EOR1 DIV XCN MOV1 MOVW DAS MOV1 MUL MOVW DAA NOT1 NOTC SLEEP STOP)
          ghidra/support/analyzeHeadless "$PWD" smoke-remaining-proj \
            -import smoke/remaining.bin \
            -processor SPC700:LE:16:default \
            -cspec default \
            -loader BinaryLoader \
            -loader-baseAddr 0x0000 \
            -scriptPath scripts \
            -postScript ProcessorSmoke.java SPC700:LE:16:default "${remaining_expected[@]}" \
            -deleteProject

          printf '\x0A\x00\x20\x2A\x00\x40\x4A\x00\x60\x6A\x00\x80\x8A\x00\xA0\xAA\x00\xC0\xCA\x00\xE0\xEA\x00\x20\x4F\x80\x1F\x00\x20' > smoke/text.bin
          ghidra/support/analyzeHeadless "$PWD" smoke-text-proj \
            -import smoke/text.bin \
            -processor SPC700:LE:16:default \
            -cspec default \
            -loader BinaryLoader \
            -loader-baseAddr 0x0000 \
            -scriptPath scripts \
            -postScript InstructionTextSmoke.java SPC700:LE:16:default \
              'OR1 C,!$0x0 .0x1' \
              'OR1 C,/ !$0x0 .0x2' \
              'AND1 C,!$0x0 .0x3' \
              'AND1 C,/ !$0x0 .0x4' \
              'EOR1 C,!$0x0 .0x5' \
              'MOV1 C,!$0x0 .0x6' \
              'MOV1 !$0x0 .0x7,C' \
              'NOT1 !$0x0 .0x1' \
              'PCALL $0xff80' \
              'JMP [ !$0x2000 +X]' \
            -deleteProject

          printf '\x40\xE4\x10\x20\xE4\x10\xDF\xBE\xCF' > smoke/semantic.bin
          ghidra/support/analyzeHeadless "$PWD" smoke-semantic-proj \
            -import smoke/semantic.bin \
            -processor SPC700:LE:16:default \
            -cspec default \
            -loader BinaryLoader \
            -loader-baseAddr 0x0000 \
            -scriptPath scripts \
            -postScript SemanticSmoke.java SPC700:LE:16:default \
            -deleteProject
